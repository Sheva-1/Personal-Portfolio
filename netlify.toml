[build]
  publish = "."

# Serve index.html at root — fixes 404 on load
[[redirects]]
  from = "/"
  to   = "/index.html"
  status = 200

# Catch-all for any unmatched route (SPA safety net)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection       = "1; mode=block"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
